services:
  tyo-mq:
    image: tyolab/tyo-mq:0.4.3
    ports:
      - "${TYO_MQ_PORT:-17352}:17352"
    environment:
      TYO_MQ_AUTH_ENABLED: "true"
      TYO_MQ_AUTO_ADMIN_TOKEN: "false"
      TYO_MQ_ADMIN_TOKEN: "${TYO_MQ_ADMIN_TOKEN:?Set TYO_MQ_ADMIN_TOKEN before running docker compose}"
      TYO_MQ_PORT: "17352"
      TYO_MQ_SETTINGS_FILE: "/data/tyo-mq.settings.json"
      TYO_MQ_ENV_FILE: "/data/.env"
    volumes:
      - tyo-mq-state:/data
    restart: unless-stopped
    networks:
      - default
      - tyo-apps-network

  manager:
    image: tyolab/tyo-mq:0.4.3
    profiles:
      - tools
    depends_on:
      - tyo-mq
    environment:
      TYO_MQ_HOST: "tyo-mq"
      TYO_MQ_PORT: "17352"
      TYO_MQ_PROTOCOL: "http"
      TYO_MQ_ADMIN_TOKEN: "${TYO_MQ_ADMIN_TOKEN:?Set TYO_MQ_ADMIN_TOKEN before running docker compose}"
    stdin_open: true
    tty: true
    command: ["npm", "run", "manager"]

volumes:
  tyo-mq-state:

networks:
  tyo-apps-network:
    external: true
    name: tyo-apps-network
